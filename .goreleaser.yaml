# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# v1.3 PR6 -- prebuilt binaries on every tagged release.
#
# What this gives a user:
#   curl -L https://github.com/danilotrix86/ArchiteX/releases/latest/download/architex_linux_amd64.tar.gz | tar xz
#   ./architex graph ./infra/
#
# without a Go toolchain. Same workflow on macOS (Intel + Apple Silicon)
# and Windows. Checksums are produced and signed-by-omission with a
# SHA-256 file so consumers can verify independently of GitHub's UI.

version: 2

project_name: architex

before:
  hooks:
    - go mod tidy

builds:
  - id: architex
    binary: architex
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is not a primary target for ArchiteX users
      # (the Action runs on Linux runners; local CLI users on Windows
      # are nearly all amd64). Skip to keep the release page tidy.
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  # ArchiteX maintains a hand-curated CHANGELOG.md (the source of truth
  # for v1.0/v1.1/v1.2/v1.3 release notes). Suppress goreleaser's
  # auto-generated changelog so the release body is exclusively the
  # CHANGELOG.md content (see release.yml: body_path).
  disable: true

release:
  github:
    owner: danilotrix86
    name: ArchiteX
  draft: false
  prerelease: auto
  name_template: 'ArchiteX {{ .Tag }}'
  header: |
    # ArchiteX {{ .Tag }}

    Prebuilt binaries are attached below for linux / darwin / windows
    on amd64 + arm64 (windows-amd64 only). Verify with `checksums.txt`.

    ## Quickstart

    ```yaml
    - uses: danilotrix86/ArchiteX@{{ .Tag }}
      with:
        terraform-dir: infra
    ```

    See the [README](https://github.com/danilotrix86/ArchiteX#-30-second-quickstart)
    for the full GitHub Action reference and the
    [examples gallery](https://github.com/danilotrix86/ArchiteX/tree/main/examples)
    for live sample reports.
  footer: |
    ---
    _Generated by [GoReleaser](https://goreleaser.com/) on commit `{{ .Commit }}`._
