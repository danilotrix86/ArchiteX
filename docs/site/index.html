<script type="text/babel">
const { IconChevronRight: ChevronRight, IconExternalLink: EL2 } = window;

function YamlLine({ line, idx }) {
  const lineNum = String(idx + 1).padStart(2, ' ');
  const indent = (line.match(/^(\s*)/) || ['',''])[1];
  const content = line.trim();
  let node;
  if (content.startsWith('- uses:')) {
    const val = content.replace('- uses:', '').trim();
    const at = val.indexOf('@');
    node = (<><span style={{color:'#555'}}>{indent}- </span><span style={{color:'#79c0ff'}}>uses</span><span style={{color:'#555'}}>: </span>
      {at>=0 ? <><span style={{color:'#a5d6ff'}}>{val.slice(0,at)}</span><span style={{color:'#00e887'}}>{val.slice(at)}</span></> : <span style={{color:'#a5d6ff'}}>{val}</span>}</>);
  } else if (content.startsWith('- ')) {
    node = <><span style={{color:'#555'}}>{indent}- </span><span style={{color:'#a5d6ff'}}>{content.slice(2)}</span></>;
  } else if (content.includes(':')) {
    const ci = content.indexOf(':');
    const key = content.slice(0, ci);
    const val = content.slice(ci + 1).trim();
    node = (<><span style={{color:'#555'}}>{indent}</span><span style={{color:'#79c0ff'}}>{key}</span><span style={{color:'#555'}}>:</span>{val && <span style={{color:'#a5d6ff'}}> {val}</span>}</>);
  } else {
    node = <span style={{color:'#a5d6ff'}}>{line}</span>;
  }
  return (
    <div style={{display:'flex',gap:16,lineHeight:'1.7'}}>
      <span style={{color:'#2a2a2a',userSelect:'none',minWidth:20,textAlign:'right',flexShrink:0}}>{lineNum}</span>
      <span>{node}</span>
    </div>
  );
}

      </div>
    </section>

}

<script type="text/babel">
function SectionLabel({ children }) {

function Problems() {
  const cards = [
    { title:'Diffs hide topology', body:"You can't see what's newly public, newly reachable, or what crossed a trust boundary. Line diffs show syntax, not architecture." },
    { title:'Scanners stop at the resource', body:'SAST, IaC linters, and CSPMs miss architectural relationships entirely. A rule can fire on a resource without understanding its role in the graph.' },
    { title:"Code can't leave the repo", body:"Regulated teams can't adopt SaaS tools that exfiltrate Terraform. Compliance mandates on-runner processing — full stop." },
  ];
  return (
    <section style={{padding:'80px 24px',borderTop:'1px solid #222'}}>
      <div style={{maxWidth:1120,margin:'0 auto'}}>

            </div>

}

function Pipeline() {
  const stages = [
    { n:'01', name:'Fact-Finder',          desc:'Parse HCL, build infrastructure graph, resolve dependencies.', tag:'deterministic' },
    { n:'02', name:'Delta Engine',         desc:'Semantic diff between base and head graphs. Identifies what changed.', tag:'deterministic' },
    { n:'03', name:'Risk & Policy Engine', desc:'18 built-in rules, weighted scoring, explainable reasons per finding.', tag:'deterministic' },
    { n:'04', name:'Interpreter',          desc:'Mermaid diagram, plain-English summary, review-focus bullets.', tag:'deterministic' },
  ];
  return (
    <section id="pipeline" style={{padding:'80px 24px',borderTop:'1px solid #222'}}>
      <div style={{maxWidth:1120,margin:'0 auto'}}>
        <SectionLabel>How it works</SectionLabel>
        <h2 style={{fontSize:'clamp(24px,3vw,36px)',fontWeight:700,letterSpacing:'-0.03em',color:'#ededed',marginBottom:8}}>Deterministic by design</h2>
        <p style={{fontSize:14,color:'#888',marginBottom:48,maxWidth:560}}>Four discrete stages run in sequence. Every stage is deterministic, auditable, and reproducible. The Interpreter is template-based — no inference, no model calls, no network.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(210px,1fr))',gap:0,background:'#1a1a1a',borderRadius:6,overflow:'hidden',border:'1px solid #1a1a1a'}}>
          {stages.map((s,i)=>(

                 onMouseEnter={e=>e.currentTarget.style.background='#0e0e0e'} onMouseLeave={e=>e.currentTarget.style.background='#0a0a0a'}>
              {i < stages.length-1 && (
                <div style={{position:'absolute',right:-10,top:'50%',transform:'translateY(-50%)',zIndex:2,width:20,height:20,background:'#0c0c0c',border:'1px solid #1f1f1f',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="7" height="7" viewBox="0 0 7 7"><path d="M1 3.5h5M3.5 1.5l2 2-2 2" stroke="#333" strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>

            "Same Terraform input always produces the same review. No models, no heuristics, no surprises."

        </div>
      </div>
    </section>
  );
}
Object.assign(window, { SectionLabel, Problems, Pipeline });

<script type="text/babel">
function FAQ() {
  const [open, setOpen] = React.useState(null);
  const items = [
    { q:'Does it support Terraform modules?',
      a:'Yes. The v1.2 parser handles modules, count, for_each, and dynamic blocks. v1.3 added a dedicated library mode for module-author repos: resources gated behind count = var.create ? 1 : 0 render as conditional phantoms in the diagram and per-resource rules short-circuit on them. v1.4 keeps all of this and extends auto-detection across both AWS and Azure resources.' },
    { q:'AWS only?',
      a:'AWS and Azure in v1.4 — 45 aws_* and 12 azurerm_* resource types (57 total). The provider is auto-detected per resource block; mixed AWS+Azure repos work out of the box. GCP is on the roadmap. Unsupported resource types emit a warning and reduce the confidence score; they never cause failures.' },
    { q:'How is this different from Snyk IaC / Checkov / tfsec?',
      a:'Those find resource-level misconfigurations (open ports, missing encryption). ArchiteX finds architectural changes — new public entry point, expanded blast radius, crossed trust boundary — that resource-level scanners structurally cannot see. Run them together: they are complementary, not overlapping.' },
    { q:'Can I customize the rules?',
      a:'Yes. Drop a .architex.yml at the root of your Terraform directory to override weights, disable rules, adjust warn/fail thresholds, ignore paths, or add suppressions with optional expiry dates. The schema is provider-agnostic: the same mechanisms apply to AWS rules, Azure rules, and the cross-provider abstract-type rules — you key on the rule\u2019s string ID. An absent file reproduces v1.2 default behavior bit-for-bit.' },
    { q:'Can I configure or suppress the Azure rules?',
      a:'Yes, identically to the AWS rules. The three Azure rule IDs at v1.4 are nsg_allow_all_ingress (3.5), storage_account_public (4.0), and mssql_database_public (3.5). Override their weights, disable them entirely, or suppress a specific azurerm_* resource (with glob match and optional expires: date) the same way you would s3_bucket_public_exposure. Inline # architex:ignore=storage_account_public reason="..." comments work above azurerm_* resource blocks too. Suppressed findings are never silent — they render in the PR comment\u2019s Suppressed Findings section with reason and source. Full reference in docs/github-action.md.' },
    { q:'Does it call out to any external service?',
      a:'Only the PR comment, posted to the GitHub REST API using the workflow\u2019s existing GITHUB_TOKEN. No external service. No telemetry. No data leaves your runner.' },
    { q:'Can my team audit the full computation?',
      a:'Yes. Every run uploads a SHA-256-signed bundle (diagram.mmd, summary.md, score.json, egress.json, report.html, manifest.json). The report.html is a single self-contained page — no JavaScript, no CDN, no remote fonts — so you can open it in an air-gapped browser and verify exactly what was computed and why.' },
  ];
  return (
    <section style={{padding:'80px 24px',borderTop:'1px solid #222'}}>
      <div style={{maxWidth:1120,margin:'0 auto'}}>
        <SectionLabel>FAQ</SectionLabel>
        <h2 style={{fontSize:'clamp(24px,3vw,36px)',fontWeight:700,letterSpacing:'-0.03em',color:'#ededed',marginBottom:40}}>Common questions</h2>
        <div style={{display:'flex',flexDirection:'column',gap:0,border:'1px solid #1f1f1f',borderRadius:6,overflow:'hidden'}}>
          {items.map((item,i)=>(
            <div key={i} style={{borderBottom:i<items.length-1?'1px solid #1f1f1f':'none'}}>
              <button onClick={()=>setOpen(open===i?null:i)}
                style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',background:open===i?'#0e0e0e':'#0a0a0a',border:'none',cursor:'pointer',textAlign:'left',transition:'background 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#0e0e0e'} onMouseLeave={e=>e.currentTarget.style.background=open===i?'#0e0e0e':'#0a0a0a'}>
                <span style={{fontSize:14,fontWeight:500,color:'#ededed',letterSpacing:'-0.01em'}}>{item.q}</span>
                <span style={{color:'#444',fontSize:16,lineHeight:1,flexShrink:0,marginLeft:16,transform:open===i?'rotate(45deg)':'rotate(0deg)',transition:'transform 0.15s'}}>+</span>
              </button>
              {open===i && (
                <div style={{padding:'0 20px 16px',background:'#0e0e0e'}}>
                  <p style={{fontSize:13,lineHeight:1.7,color:'#888',margin:0}}>{item.a}</p>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Roadmap() {
  const items = [
