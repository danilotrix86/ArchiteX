name: ArchiteX

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  selftest:
    name: Selftest (testdata/base -> testdata/head)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build architex
        run: go build -o architex .

      - name: Unit tests
        run: go test ./... -count=1

      - name: Run report against testdata
        run: |
          set -euo pipefail
          mkdir -p .architex
          ./architex report ./testdata/base ./testdata/head --out ./.architex > /dev/null
          BUNDLE="$(ls -td .architex/*/ | head -1)"
          echo "Bundle: ${BUNDLE}"
          ls -la "${BUNDLE}"

      - name: Assert all five §10.1 sections are present in summary.md
        run: |
          set -euo pipefail
          BUNDLE="$(ls -td .architex/*/ | head -1)"
          SUMMARY="${BUNDLE}summary.md"
          for HEADER in \
              "Risk Level" \
              "## Plain-English Summary" \
              "## Suggested Review Focus" \
              "## Delta Diagram" \
              "## Policy Result" \
              "_Generated by ArchiteX (deterministic mode)._"; do
            if ! grep -q "${HEADER}" "${SUMMARY}"; then
              echo "::error file=${SUMMARY}::missing required section: ${HEADER}"
              exit 1
            fi
          done
          echo "All five §10.1 sections present."

      - name: Upload selftest bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architex-selftest-bundle-${{ github.run_id }}
          path: ./.architex/
          if-no-files-found: error
          retention-days: 7

  dogfood:
    name: Dogfood the Action on this PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: selftest
    steps:
      - name: Run ArchiteX (advisory)
        uses: ./
        with:
          terraform-dir: testdata/head
          mode: advisory
