name: Release

# v1.3 PR6 -- prebuilt binaries via goreleaser.
#
# Tagging `vX.Y.Z` (e.g. `git tag v1.3.0 && git push origin v1.3.0`)
# triggers this workflow which:
#   1. validates formatting + vet + tests on the tagged commit;
#   2. cross-compiles linux/darwin/windows on amd64+arm64 (skipping
#      windows/arm64 -- see .goreleaser.yaml);
#   3. attaches the archives + checksums.txt to the GitHub release page;
#   4. uses CHANGELOG.md as the release body so users always see the
#      hand-curated, version-by-version notes.
#
# Trigger pattern note (post-v1.4.0 incident):
# We deliberately match `v*.*.*` (semver triple) rather than `v*`. This
# means pushing the floating `v1` tag does NOT fire a release workflow,
# which prevents a parallel-publish race where two goreleaser jobs (one
# for `v1.4.0` and one for `v1`, pushed seconds apart) try to upload
# identical assets to the same GitHub Release and one of them fails with
# `422 already_exists`. The floating `v1` tag is now a pure pointer with
# no CI side-effects -- exactly what a floating tag should be.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate tagged commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          DIRTY="$(gofmt -l .)"
          if [ -n "${DIRTY}" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "${DIRTY}"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

  release:
    name: Build prebuilt binaries and publish release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs the full history to derive {{ .Commit }} /
          # version metadata correctly.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
